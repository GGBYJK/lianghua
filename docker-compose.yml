services:
  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["alembic", "upgrade", "head"]
    env_file:
      - .env

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    expose:
      - "8010"

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "-m", "app.worker"]
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "80:80"
