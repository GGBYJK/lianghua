services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    restart: unless-stopped
    expose:
      - "8010"

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "-m", "app.worker"]
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "80:80"
