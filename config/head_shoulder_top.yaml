default:
  pivot_left: 3
  pivot_right: 3
  min_shoulder_to_head_height_ratio: 0.3
  max_shoulder_diff_pct: 0.004
  max_neck_diff_pct: 0.004
  min_right_leg_to_left_leg_ratio: 0.6
  max_right_leg_to_left_leg_ratio: 2.0
  min_right_shoulder_ratio_to_left: 0.85
  require_head_beyond_shoulders_and_necks: false
  require_shoulders_between_opposite_neck_and_head: false
  min_shoulder_to_neck_height: 0
  right_shoulder_must_below_head: true
  enable_ma_filter: false
  ma_short: 3
  ma_mid: 5
  ma_long: 8
  ma_periods: [5, 10, 20, 30, 60, 250]
  require_ma_bearish_alignment: false
  require_close_below_ma_long: true
  enable_macd_divergence: false
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  macd_price_new_high_pct: 0.01
  use_macd_hist_for_divergence: true
  break_by: close
  neckline_break_pct: 0.002
  max_bars_after_right_shoulder: 30
  max_signal_age_bars: 0
  enable_score: true
  min_score_to_alert: 70

timeframes:
  1m:
    pivot_left: 5
    pivot_right: 5
    min_right_leg_to_left_leg_ratio: 0.35
    max_right_leg_to_left_leg_ratio: 3.0
    require_head_beyond_shoulders_and_necks: true
    require_shoulders_between_opposite_neck_and_head: true
    min_shoulder_to_neck_height: 4
    macd_price_new_high_pct: 0.0005
    min_score_to_alert: 70
  3m:
    pivot_left: 3
    pivot_right: 3
    max_shoulder_diff_pct: 0.005
    enable_right_leg_ratio_filter: false
    require_head_beyond_shoulders_and_necks: true
    require_shoulders_between_opposite_neck_and_head: true
    macd_price_new_high_pct: 0.0005
    max_signal_age_bars: 150
    min_score_to_alert: 70
  5m:
    pivot_left: 3
    pivot_right: 3
    max_shoulder_diff_pct: 0.005
    max_right_leg_to_left_leg_ratio: 4.0
    require_head_beyond_shoulders_and_necks: true
    require_shoulders_between_opposite_neck_and_head: true
    macd_price_new_high_pct: 0.0005
    max_signal_age_bars: 150
    min_score_to_alert: 70
  15m:
    pivot_left: 3
    pivot_right: 3
    max_bars_after_right_shoulder: 40
    min_score_to_alert: 70
  30m:
    pivot_left: 3
    pivot_right: 3
    macd_price_new_high_pct: 0.003
    min_score_to_alert: 70
  1h:
    pivot_left: 3
    pivot_right: 3
    macd_price_new_high_pct: 0.004
    min_score_to_alert: 70

symbols:
  rb:
    5m:
      max_neck_diff_pct: 0.004
  ag:
    5m:
      max_neck_diff_pct: 0.004
  hc:
    1h:
      min_right_leg_to_left_leg_ratio: 0.2
      max_right_leg_to_left_leg_ratio: 5.0
